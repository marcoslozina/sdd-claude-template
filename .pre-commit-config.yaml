# Instalación:
#   pip install pre-commit
#   pre-commit install           # hooks de pre-commit
#   pre-commit install --hook-type commit-msg  # hook de conventional commits

repos:
  # ── Checks universales ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  # ── Secrets (gitleaks) ──────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # ── Python: ruff (lint + format) ────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── TypeScript / JS: prettier ───────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [ts, tsx, javascript, jsx, json, css, markdown]

  # ── Go: gofmt + go vet ─────────────────────────────────────────
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        entry: bash -c 'UNFORMATTED=$(gofmt -l "$@"); [ -z "$UNFORMATTED" ] || { echo "Run gofmt:"; echo "$UNFORMATTED"; exit 1; }'
        types: [go]
        pass_filenames: true
      - id: go-vet
        name: go vet
        language: system
        entry: bash -c 'go vet ./...'
        types: [go]
        pass_filenames: false

  # ── Java: google-java-format ────────────────────────────────────
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.13.0
    hooks:
      - id: pretty-format-java
        args: [--autofix]

  # ── Conventional Commits (commit-msg hook) ──────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - test
          - chore
          - perf
          - ci
          - build
          - revert
