name: Link Check

on:
  pull_request:
    types: [opened, synchronize]
  # También semanal para detectar links que se rompen con el tiempo
  schedule:
    - cron: '0 9 * * 1'

jobs:
  link-check:
    name: Check links in markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --exclude-path node_modules
            --exclude-path .git
            --exclude-path vendor
            --exclude 'localhost'
            --exclude '127\.0\.0\.1'
            --exclude 'example\.com'
            --timeout 20
            --max-retries 3
            '**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment broken links on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔗 Links rotos detectados\n\nEl check de links falló. Revisá el log del workflow para ver qué URLs están caídas o mal escritas.\n\n> Verificá los links en archivos \`.md\` antes de mergear.`
            })
